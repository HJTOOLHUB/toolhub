<script>
    // 获取元素
    const inputTextarea = document.getElementById('inputText');
    const previewDiv = document.getElementById('previewArea');
    const charCountSpan = document.getElementById('charCount');
    const wordCountSpan = document.getElementById('wordCount');
    const lineCountSpan = document.getElementById('lineCount');
    
    // 统计变量
    const statCharsTotal = document.getElementById('statCharsTotal');
    const statCharsNoSpace = document.getElementById('statCharsNoSpace');
    const statChinese = document.getElementById('statChinese');
    const statDigits = document.getElementById('statDigits');
    const statLetters = document.getElementById('statLetters');
    
    // 辅助函数: 更新所有统计及预览
    function updateAllStats() {
        let text = inputTextarea.value;
        // 字符数
        charCountSpan.innerText = text.length + ' 字符';
        // 单词数 (按空格/标点分割粗略统计)
        const words = text.trim() ? text.trim().split(/\s+/) : [];
        const wordCount = text.trim() === '' ? 0 : words.filter(w => w.length > 0).length;
        wordCountSpan.innerText = wordCount + ' 词';
        // 行数
        const lines = text.split(/\r?\n/);
        const lineCount = lines.filter(l => l.length > 0 || text.includes('\n')).length;
        lineCountSpan.innerText = lineCount + ' 行';
        
        // 详细统计
        let charsNoSpace = 0, chineseCount = 0, digitsCount = 0, lettersCount = 0;
        for (let ch of text) {
            if (ch !== ' ' && ch !== '\n' && ch !== '\r' && ch !== '\t') charsNoSpace++;
            if (/[\u4e00-\u9fa5]/.test(ch)) chineseCount++;
            if (/[0-9]/.test(ch)) digitsCount++;
            if (/[a-zA-Z]/.test(ch)) lettersCount++;
        }
        statCharsTotal.innerText = text.length;
        statCharsNoSpace.innerText = charsNoSpace;
        statChinese.innerText = chineseCount;
        statDigits.innerText = digitsCount;
        statLetters.innerText = lettersCount;
        
        // 更新预览 (支持HTML换行保留)
        let previewHtml = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        previewHtml = previewHtml.replace(/\n/g, '<br>');
        previewDiv.innerHTML = previewHtml || '<span class="text-gray-400">暂无内容，输入文字后将显示排版效果...</span>';
    }
    
    // 通用执行函数：获取当前文本，应用回调后设置文本并更新统计
    function applyTransformation(callback, keepSelection = false) {
        let text = inputTextarea.value;
        let newText = callback(text);
        if (newText !== undefined && typeof newText === 'string') {
            inputTextarea.value = newText;
            updateAllStats();
            // 可选保持光标位置
            if (!keepSelection) inputTextarea.focus();
        } else {
            console.warn("转换无效");
        }
    }
    
    // 大小写转换
    document.getElementById('toUpperCaseBtn').addEventListener('click', () => {
        applyTransformation(t => t.toUpperCase());
    });
    document.getElementById('toLowerCaseBtn').addEventListener('click', () => {
        applyTransformation(t => t.toLowerCase());
    });
    document.getElementById('toCapitalizeBtn').addEventListener('click', () => {
        applyTransformation(t => {
            if (!t) return t;
            return t.charAt(0).toUpperCase() + t.slice(1).toLowerCase();
        });
    });
    document.getElementById('toTitleCaseBtn').addEventListener('click', () => {
        applyTransformation(t => {
            return t.replace(/\b\w/g, char => char.toUpperCase());
        });
    });
    
    // 空格/空行处理
    document.getElementById('trimSpacesBtn').addEventListener('click', () => {
        applyTransformation(t => t.trim());
    });
    document.getElementById('removeExtraSpacesBtn').addEventListener('click', () => {
        applyTransformation(t => t.replace(/\s+/g, ' '));
    });
    document.getElementById('removeBlankLinesBtn').addEventListener('click', () => {
        applyTransformation(t => t.replace(/^\s*[\r\n]+/gm, '').replace(/\n\s*\n/g, '\n').replace(/^\s+|\s+$/g, (match, offset, str) => offset === 0 ? match : match));
        // 更稳健：删除空行
        applyTransformation(t => t.split(/\r?\n/).filter(line => line.trim().length > 0).join('\n'));
    });
    document.getElementById('removeAllSpacesBtn').addEventListener('click', () => {
        applyTransformation(t => t.replace(/\s/g, ''));
    });
    
    // 段落排版
    document.getElementById('addIndentBtn').addEventListener('click', () => {
        applyTransformation(t => t.split(/\r?\n/).map(line => line.trim() ? '  ' + line : line).join('\n'));
    });
    document.getElementById('removeIndentBtn').addEventListener('click', () => {
        applyTransformation(t => t.replace(/^[ \t]+/gm, ''));
    });
    document.getElementById('autoWrapBtn').addEventListener('click', () => {
        applyTransformation(t => {
            const maxWidth = 80;
            let paragraphs = t.split(/\r?\n/);
            let wrapped = [];
            for (let para of paragraphs) {
                if (para.trim() === '') {
                    wrapped.push('');
                    continue;
                }
                let words = para.split(/(\s+)/);
                let line = '';
                let paraWrapped = [];
                for (let w of words) {
                    if ((line + w).length > maxWidth && line.length > 0) {
                        paraWrapped.push(line);
                        line = w;
                    } else {
                        line += w;
                    }
                }
                if (line) paraWrapped.push(line);
                wrapped.push(paraWrapped.join('\n'));
            }
            return wrapped.join('\n');
        });
    });
    document.getElementById('joinParagraphsBtn').addEventListener('click', () => {
        applyTransformation(t => t.replace(/\r?\n/g, ' ').replace(/\s+/g, ' ').trim());
    });
    
    // 高级工具
    document.getElementById('reverseTextBtn').addEventListener('click', () => {
        applyTransformation(t => t.split('').reverse().join(''));
    });
    document.getElementById('removePunctuationBtn').addEventListener('click', () => {
        applyTransformation(t => t.replace(/[，,。？?！!；;：“\"“”‘’《》【】（）()\[\]{}]/g, ''));
    });
    document.getElementById('sortLinesBtn').addEventListener('click', () => {
        applyTransformation(t => {
            let lines = t.split(/\r?\n/);
            lines.sort((a,b) => a.localeCompare(b));
            return lines.join('\n');
        });
    });
    document.getElementById('deduplicateLinesBtn').addEventListener('click', () => {
        applyTransformation(t => {
            let lines = t.split(/\r?\n/);
            let unique = [];
            let set = new Set();
            for (let line of lines) {
                if (!set.has(line)) {
                    set.add(line);
                    unique.push(line);
                }
            }
            return unique.join('\n');
        });
    });
    
    // 添加前缀后缀
    document.getElementById('addPrefixSuffixBtn').addEventListener('click', () => {
        const prefix = document.getElementById('prefixInput').value;
        const suffix = document.getElementById('suffixInput').value;
        applyTransformation(t => {
            let lines = t.split(/\r?\n/);
            let newLines = lines.map(line => prefix + line + suffix);
            return newLines.join('\n');
        });
    });
    
    // 清空、复制
    document.getElementById('clearTextBtn').addEventListener('click', () => {
        inputTextarea.value = '';
        updateAllStats();
        inputTextarea.focus();
    });
    document.getElementById('copyResultBtn').addEventListener('click', async () => {
        try {
            await navigator.clipboard.writeText(inputTextarea.value);
            alert('文本已复制到剪贴板');
        } catch (err) {
            alert('复制失败，可手动选择复制');
        }
    });
    
    // 监听输入事件，实时更新统计与预览
    inputTextarea.addEventListener('input', updateAllStats);
    
    // 初始化统计
    updateAllStats();
    
    // 手机菜单
    document.getElementById('menu-toggle').onclick = function() {
        document.getElementById('mobile-menu').classList.toggle('hidden');
    };
    
    // 附加: 确保预览响应式
    window.addEventListener('resize', () => {});
    
    // 增强去除多余空格函数更准确
    const origRemoveExtra = document.getElementById('removeExtraSpacesBtn').onclick;
    document.getElementById('removeExtraSpacesBtn').addEventListener('click', () => {
        applyTransformation(t => t.replace(/[ \t]+/g, ' ').replace(/\n\s+/g, '\n').replace(/\s+$/gm, ''));
    });
    // 修复空行删除简单调用
    const origDelBlank = document.getElementById('removeBlankLinesBtn').onclick;
    document.getElementById('removeBlankLinesBtn').addEventListener('click', () => {
        applyTransformation(t => {
            let lines = t.split(/\r?\n/);
            let result = lines.filter(line => line.trim().length > 0);
            return result.join('\n');
        });
    });
    
    // 额外安全性：给所有工具按钮防止空白操作
    const allToolBtns = document.querySelectorAll('.tool-btn, #addPrefixSuffixBtn, #clearTextBtn, #copyResultBtn');
    allToolBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            // 不影响原有逻辑，只是保证无bug
        });
    });
</script>
</body>
</html>
