<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
        }

        .info {
            margin-top: 20px;
            padding: 15px;
            background: #e7f3ff;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #004085;
        }

        .info h3 {
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .info ul {
            margin-left: 20px;
        }

        .info li {
            margin: 5px 0;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 登录测试</h2>
        
        <form id="test-login-form">
            <div class="form-group">
                <label>用户名 / 邮箱</label>
                <input type="text" id="username" value="admin" required>
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" value="admin123" required>
            </div>

            <button type="submit" id="submit-btn">登录测试</button>
        </form>

        <div id="result" class="result"></div>

        <div class="info">
            <h3>📋 默认管理员账号：</h3>
            <ul>
                <li><strong>用户名：</strong> admin</li>
                <li><strong>密码：</strong> admin123</li>
                <li><strong>邮箱：</strong> admin@example.com</li>
            </ul>
            <p style="margin-top: 10px; font-weight: bold;">
                ⚠️ 请确保输入的用户名和密码完全正确，不要有多余的空格！
            </p>
        </div>

        <a href="login.html" class="back-link">← 返回正常登录页面</a>
    </div>

    <script>
        const API_BASE = '/api';

        document.getElementById('test-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const result = document.getElementById('result');
            const submitBtn = document.getElementById('submit-btn');

            // 显示测试信息
            console.log('发送登录请求...');
            console.log('用户名:', username);
            console.log('密码长度:', password.length);
            console.log('密码前3位:', password.substring(0, 3));

            result.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                
                console.log('响应状态:', response.status);
                console.log('响应数据:', data);

                if (data.success) {
                    result.className = 'result show success';
                    result.innerHTML = `
                        ✅ <strong>登录成功！</strong><br>
                        欢迎回来，${data.data.user.username}！<br>
                        <small>正在跳转到用户中心...</small>
                    `;
                    
                    // 保存登录信息
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));
                    
                    // 跳转到用户中心
                    setTimeout(() => {
                        window.location.href = 'user-center.html';
                    }, 1500);
                } else {
                    result.className = 'result show error';
                    result.innerHTML = `
                        ❌ <strong>登录失败</strong><br>
                        ${data.message}<br>
                        <small>请检查用户名和密码是否正确</small>
                    `;
                }
            } catch (error) {
                console.error('登录请求失败:', error);
                result.className = 'result show error';
                result.innerHTML = `
                    ❌ <strong>网络错误</strong><br>
                    无法连接到服务器<br>
                    <small>${error.message}</small>
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '登录测试';
            }
        });
    </script>
</body>
</html>
