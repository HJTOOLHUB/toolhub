<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心 - 在线工具平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-left a {
            color: #667eea;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .header-left h1 {
            font-size: 1.5rem;
            color: #333;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .user-card {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 4px solid #667eea;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .user-title {
            font-size: 0.9rem;
            color: #667eea;
            margin-bottom: 10px;
        }

        .user-badges {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge-vip {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: white;
        }

        .badge-svip {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .badge-admin {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
        }

        .badge-superadmin {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
        }

        .nav-menu {
            margin-top: 20px;
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #555;
        }

        .nav-item:hover {
            background: #f8f9fa;
            color: #667eea;
        }

        .nav-item.active {
            background: #667eea;
            color: white;
        }

        .main-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .section-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 12px;
            color: white;
            text-align: center;
        }

        .stat-card i {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .level-progress {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .level-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .level-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .level-icon {
            font-size: 2rem;
        }

        .level-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }

        .level-exp {
            color: #667eea;
            font-weight: 500;
        }

        .progress-bar {
            height: 12px;
            background: #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 6px;
            transition: width 0.5s ease;
        }

        .progress-text {
            margin-top: 10px;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
        }

        .info-card h3 {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
        }

        .info-value {
            color: #333;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .logs-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .log-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-content {
            flex: 1;
        }

        .log-action {
            font-weight: 500;
            color: #333;
            margin-bottom: 5px;
        }

        .log-time {
            font-size: 0.85rem;
            color: #999;
        }

        .log-badge {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        .log-badge-login {
            background: #d4edda;
            color: #155724;
        }

        .log-badge-register {
            background: #cce5ff;
            color: #004085;
        }

        .log-badge-update {
            background: #fff3cd;
            color: #856404;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .header-right {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        .loading i {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: #27ae60;
        }

        .toast.error {
            background: #e74c3c;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h1>用户中心</h1>
            </div>
            <div class="header-right">
                <a href="index.html" class="btn btn-outline">
                    <i class="fas fa-home"></i>
                    返回首页
                </a>
                <button id="logout-btn" class="btn btn-danger">
                    <i class="fas fa-sign-out-alt"></i>
                    退出登录
                </button>
            </div>
        </div>

        <div class="dashboard">
            <div class="sidebar">
                <div class="user-card">
                    <div class="avatar">
                        <img id="user-avatar" src="" alt="头像">
                    </div>
                    <div class="user-name" id="user-name">加载中...</div>
                    <div class="user-title" id="user-title-display">暂无称号</div>
                    <div class="user-badges" id="user-badges"></div>
                </div>

                <div class="nav-menu">
                    <div class="nav-item active" data-section="overview">
                        <i class="fas fa-home"></i>
                        账户概览
                    </div>
                    <div class="nav-item" data-section="profile">
                        <i class="fas fa-user"></i>
                        个人资料
                    </div>
                    <div class="nav-item" data-section="security">
                        <i class="fas fa-shield-alt"></i>
                        安全设置
                    </div>
                    <div class="nav-item" data-section="stats">
                        <i class="fas fa-chart-line"></i>
                        经验统计
                    </div>
                    <div class="nav-item" data-section="logs">
                        <i class="fas fa-history"></i>
                        操作记录
                    </div>
                </div>
            </div>

            <div class="main-content">
                <!-- 账户概览 -->
                <div class="content-section active" id="section-overview">
                    <h2 class="section-title">账户概览</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <i class="fas fa-star"></i>
                            <div class="value" id="stat-exp">0</div>
                            <div class="label">经验值</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-tools"></i>
                            <div class="value" id="stat-tools">0</div>
                            <div class="label">使用工具次数</div>
                        </div>
                        <div class="stat-card">
                            <i class="fas fa-sign-in-alt"></i>
                            <div class="value" id="stat-logins">0</div>
                            <div class="label">登录次数</div>
                        </div>
                    </div>

                    <div class="level-progress">
                        <div class="level-header">
                            <div class="level-info">
                                <span class="level-icon" id="level-icon">🥉</span>
                                <span class="level-name" id="level-name">青铜</span>
                            </div>
                            <span class="level-exp"><span id="current-exp">0</span> 经验值</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="exp-progress" style="width: 0%"></div>
                        </div>
                        <div class="progress-text" id="next-level-text">
                            距离下一等级还需 100 经验值
                        </div>
                    </div>

                    <div class="info-grid">
                        <div class="info-card">
                            <h3><i class="fas fa-info-circle"></i> 账户信息</h3>
                            <div class="info-item">
                                <span class="info-label">用户ID</span>
                                <span class="info-value" id="info-id">-</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">注册时间</span>
                                <span class="info-value" id="info-created">-</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">最后登录</span>
                                <span class="info-value" id="info-lastlogin">-</span>
                            </div>
                        </div>
                        <div class="info-card">
                            <h3><i class="fas fa-crown"></i> 会员特权</h3>
                            <div class="info-item">
                                <span class="info-label">VIP等级</span>
                                <span class="info-value" id="info-vip">-</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">用户等级</span>
                                <span class="info-value" id="info-level">-</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">用户称号</span>
                                <span class="info-value" id="info-title">-</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 个人资料 -->
                <div class="content-section" id="section-profile">
                    <h2 class="section-title">个人资料</h2>
                    <form id="profile-form">
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" class="form-input" id="profile-username">
                        </div>
                        <div class="form-group">
                            <label>邮箱</label>
                            <input type="email" class="form-input" id="profile-email" disabled>
                        </div>
                        <div class="form-group">
                            <label>头像 URL</label>
                            <input type="url" class="form-input" id="profile-avatar" placeholder="输入头像图片链接">
                        </div>
                        <div class="form-group">
                            <label>称号（最多20个字符）</label>
                            <input type="text" class="form-input" id="profile-title" maxlength="20" placeholder="设置你的专属称号">
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i>
                            保存修改
                        </button>
                    </form>
                </div>

                <!-- 安全设置 -->
                <div class="content-section" id="section-security">
                    <h2 class="section-title">安全设置</h2>
                    <form id="password-form">
                        <div class="form-group">
                            <label>当前密码</label>
                            <input type="password" class="form-input" id="current-password" required>
                        </div>
                        <div class="form-group">
                            <label>新密码</label>
                            <input type="password" class="form-input" id="new-password" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label>确认新密码</label>
                            <input type="password" class="form-input" id="confirm-new-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-key"></i>
                            修改密码
                        </button>
                    </form>
                </div>

                <!-- 经验统计 -->
                <div class="content-section" id="section-stats">
                    <h2 class="section-title">经验统计</h2>
                    <div class="info-grid">
                        <div class="info-card">
                            <h3><i class="fas fa-trophy"></i> 等级说明</h3>
                            <div id="levels-list"></div>
                        </div>
                        <div class="info-card">
                            <h3><i class="fas fa-crown"></i> VIP特权</h3>
                            <div id="vip-list"></div>
                        </div>
                    </div>
                </div>

                <!-- 操作记录 -->
                <div class="content-section" id="section-logs">
                    <h2 class="section-title">操作记录</h2>
                    <div class="logs-list" id="logs-container">
                        <div class="loading">
                            <i class="fas fa-spinner"></i>
                            <p>加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentUser = null;

        // 检查登录状态
        function checkAuth() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            
            if (!token || !userStr) {
                window.location.href = 'login.html';
                return null;
            }
            
            return JSON.parse(userStr);
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 加载用户信息
        async function loadUserInfo() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error('获取用户信息失败');
                }
                
                const result = await response.json();
                if (result.success) {
                    currentUser = result.data;
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    updateUI();
                }
            } catch (error) {
                console.error('加载用户信息失败:', error);
                showToast('加载用户信息失败', 'error');
            }
        }

        // 加载等级配置
        async function loadLevelConfig() {
            try {
                const response = await fetch(`${API_BASE}/users/levels/config`);
                const result = await response.json();
                
                if (result.success) {
                    displayLevels(result.data.userLevels, result.data.vipLevels);
                }
            } catch (error) {
                console.error('加载等级配置失败:', error);
            }
        }

        // 加载操作日志
        async function loadLogs() {
            const container = document.getElementById('logs-container');
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/users/logs?limit=50`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const result = await response.json();
                
                if (result.success && result.data.logs.length > 0) {
                    container.innerHTML = result.data.logs.map(log => `
                        <div class="log-item">
                            <div class="log-content">
                                <div class="log-action">${getActionText(log.action)}</div>
                                <div class="log-time">${new Date(log.timestamp).toLocaleString('zh-CN')}</div>
                            </div>
                            <span class="log-badge log-badge-${log.action}">${log.action}</span>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p style="text-align:center;color:#999;padding:50px;">暂无操作记录</p>';
                }
            } catch (error) {
                console.error('加载日志失败:', error);
                container.innerHTML = '<p style="text-align:center;color:#999;padding:50px;">加载失败</p>';
            }
        }

        // 获取操作文本
        function getActionText(action) {
            const actions = {
                'login': '用户登录',
                'register': '注册账号',
                'updateProfile': '更新资料',
                'changePassword': '修改密码',
                'gainExp': '获得经验',
                'logout': '退出登录'
            };
            return actions[action] || action;
        }

        // 显示等级信息
        function displayLevels(userLevels, vipLevels) {
            const levelsList = document.getElementById('levels-list');
            levelsList.innerHTML = Object.entries(userLevels).map(([key, level]) => `
                <div class="info-item">
                    <span class="info-label">${level.icon} ${level.name}</span>
                    <span class="info-value">${level.minExp}+ 经验</span>
                </div>
            `).join('');

            const vipList = document.getElementById('vip-list');
            vipList.innerHTML = Object.entries(vipLevels).map(([key, level]) => `
                <div class="info-item">
                    <span class="info-label">${level.name}</span>
                    <span class="info-value" style="color:${level.color}">●</span>
                </div>
            `).join('');
        }

        // 更新UI
        function updateUI() {
            if (!currentUser) return;

            // 基本信息
            document.getElementById('user-name').textContent = currentUser.username;
            document.getElementById('user-avatar').src = currentUser.avatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${currentUser.username}`;
            document.getElementById('user-title-display').textContent = currentUser.title || '暂无称号';

            // 徽章
            const badgesEl = document.getElementById('user-badges');
            let badgesHTML = '';
            
            if (currentUser.role === 'superadmin') {
                badgesHTML += '<span class="badge badge-superadmin">👑 超级管理员</span>';
            } else if (currentUser.role === 'admin') {
                badgesHTML += '<span class="badge badge-admin">🛡️ 管理员</span>';
            }
            
            if (currentUser.vipLevel === 'svip') {
                badgesHTML += '<span class="badge badge-svip">SVIP</span>';
            } else if (currentUser.vipLevel === 'vip') {
                badgesHTML += '<span class="badge badge-vip">VIP</span>';
            }
            
            badgesEl.innerHTML = badgesHTML;

            // 统计数据
            document.getElementById('stat-exp').textContent = currentUser.exp || 0;
            document.getElementById('stat-tools').textContent = currentUser.stats?.toolsUsed || 0;
            document.getElementById('stat-logins').textContent = currentUser.stats?.loginCount || 0;

            // 等级信息
            const levelNames = {
                'bronze': { name: '青铜', icon: '🥉' },
                'silver': { name: '白银', icon: '🥈' },
                'gold': { name: '黄金', icon: '🥇' },
                'platinum': { name: '铂金', icon: '💎' },
                'diamond': { name: '钻石', icon: '💠' },
                'master': { name: '大师', icon: '🌟' },
                'grandmaster': { name: '宗师', icon: '👑' }
            };

            const vipNames = {
                'none': '普通用户',
                'vip': 'VIP会员',
                'svip': 'SVIP会员'
            };

            const levelInfo = levelNames[currentUser.level] || levelNames['bronze'];
            document.getElementById('level-icon').textContent = levelInfo.icon;
            document.getElementById('level-name').textContent = levelInfo.name;
            document.getElementById('current-exp').textContent = currentUser.exp || 0;

            // 进度条
            const nextLevelExp = getNextLevelExp(currentUser.level);
            const currentLevelExp = getCurrentLevelExp(currentUser.level);
            const progress = nextLevelExp > currentLevelExp 
                ? Math.min(((currentUser.exp - currentLevelExp) / (nextLevelExp - currentLevelExp)) * 100, 100)
                : 100;
            
            document.getElementById('exp-progress').style.width = progress + '%';
            document.getElementById('next-level-text').textContent = nextLevelExp > currentLevelExp
                ? `距离下一等级还需 ${nextLevelExp - currentUser.exp} 经验值`
                : '已达到最高等级！';

            // 账户信息
            document.getElementById('info-id').textContent = currentUser.id.substring(0, 8) + '...';
            document.getElementById('info-created').textContent = new Date(currentUser.createdAt).toLocaleDateString('zh-CN');
            document.getElementById('info-lastlogin').textContent = currentUser.lastLoginAt 
                ? new Date(currentUser.lastLoginAt).toLocaleString('zh-CN')
                : '-';
            document.getElementById('info-vip').textContent = vipNames[currentUser.vipLevel] || '普通用户';
            document.getElementById('info-level').textContent = levelInfo.icon + ' ' + levelInfo.name;
            document.getElementById('info-title').textContent = currentUser.title || '暂无';

            // 个人资料表单
            document.getElementById('profile-username').value = currentUser.username;
            document.getElementById('profile-email').value = currentUser.email;
            document.getElementById('profile-avatar').value = currentUser.avatar || '';
            document.getElementById('profile-title').value = currentUser.title || '';
        }

        function getNextLevelExp(level) {
            const levels = {
                'bronze': 100,
                'silver': 500,
                'gold': 1000,
                'platinum': 5000,
                'diamond': 10000,
                'master': 50000,
                'grandmaster': Infinity
            };
            return levels[level] || 100;
        }

        function getCurrentLevelExp(level) {
            const levels = {
                'bronze': 0,
                'silver': 100,
                'gold': 500,
                'platinum': 1000,
                'diamond': 5000,
                'master': 10000,
                'grandmaster': 50000
            };
            return levels[level] || 0;
        }

        // 导航切换
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                
                const section = item.dataset.section;
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`section-${section}`).classList.add('active');
                
                if (section === 'logs') {
                    loadLogs();
                }
                if (section === 'stats') {
                    loadLevelConfig();
                }
            });
        });

        // 更新资料表单
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('profile-username').value.trim();
            const avatar = document.getElementById('profile-avatar').value.trim();
            const title = document.getElementById('profile-title').value.trim();

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/users/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username, avatar, title })
                });

                const result = await response.json();

                if (result.success) {
                    showToast('资料更新成功');
                    loadUserInfo();
                } else {
                    showToast(result.message, 'error');
                }
            } catch (error) {
                showToast('更新失败', 'error');
            }
        });

        // 修改密码表单
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-new-password').value;

            if (newPassword !== confirmPassword) {
                showToast('两次输入的密码不一致', 'error');
                return;
            }

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/users/password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ currentPassword, newPassword })
                });

                const result = await response.json();

                if (result.success) {
                    showToast('密码修改成功');
                    document.getElementById('password-form').reset();
                } else {
                    showToast(result.message, 'error');
                }
            } catch (error) {
                showToast('修改失败', 'error');
            }
        });

        // 退出登录
        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                const token = localStorage.getItem('token');
                await fetch(`${API_BASE}/auth/logout`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
            } catch (error) {
                console.error('退出登录失败:', error);
            }
            
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            currentUser = checkAuth();
            if (currentUser) {
                updateUI();
                loadLevelConfig();
            }
        });
    </script>
</body>
</html>
