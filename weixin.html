<!DOCTYPE html>
<link rel="icon" href="https://img.cdn1.vip/i/69e48398936a9_1776583576.png" type="image/x-icon">
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>添加微信好友</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 微信官方绿色渐变主题 */
            background: linear-gradient(135deg, #07C160 0%, #06B058 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        /* 粒子画布 */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 液态玻璃卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(7, 193, 96, 0.25);
            padding: 2.5rem;
            text-align: center;
            max-width: 90%;
            width: 400px;
            color: #fff;
            position: relative;
            z-index: 1;
        }

        /* 二维码图片容器 */
        .qr-container {
            width: 100%;
            max-width: 280px;
            margin: 0 auto 1.5rem;
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
            padding: 1rem;
        }

        .qr-code {
            width: 100%;
            display: block;
            border-radius: 8px;
        }

        /* 信息部分 */
        .nickname {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .location {
            font-size: 1rem;
            opacity: 0.85;
            margin-bottom: 2rem;
        }

        /* 按钮样式 */
        .action-btn {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            padding: 12px 32px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0.5rem;
            backdrop-filter: blur(5px);
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* 微信绿色主按钮 */
        .copy-btn {
            background: #ffffff;
            color: #07C160;
            border: none;
            font-weight: 600;
        }

        .copy-btn:hover {
            background: #f5f5f5;
        }

        .tips {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* 复制成功提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 1.5rem;
            }
            .nickname {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 动态粒子背景 -->
    <canvas id="particles-canvas"></canvas>

    <div class="glass-card">
        <div class="qr-container">
            <img src="https://img.cdn1.vip/i/6a00325f85573_1778397791.webp" alt="微信二维码" class="qr-code">
        </div>
        <h1 class="nickname">Hou</h1>
        <p class="location">扫码添加微信</p>
        
        <button class="action-btn copy-btn" id="copyBtn">复制微信号</button>
        <p class="tips">打开微信扫一扫即可添加</p>
    </div>

    <!-- 复制成功提示 -->
    <div class="toast" id="toast">复制成功！</div>

    <script>
        // 改成你的微信号
        const wechatId = "Hou776836";
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');

        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(wechatId);
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            } catch (err) {
                const textarea = document.createElement('textarea');
                textarea.value = wechatId;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }
        });

        // 粒子背景
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                this.color = 'rgba(255, 255, 255, 0.4)';
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const numberOfParticles = Math.floor((canvas.width * canvas.height) / 15000);
            for (let i = 0; i < numberOfParticles; i++) {
                particles.push(new Particle());
            }
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 100) {
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.15 - distance / 600})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[j].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            connectParticles();
            requestAnimationFrame(animate);
        }

        initParticles();
        animate();
    
    // 禁用双指缩放
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
    document.addEventListener('gestureend', function(e) { e.preventDefault(); });
    document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) { e.preventDefault(); }
    }, { passive: false });
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(e) {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) { e.preventDefault(); }
        lastTouchEnd = now;
    }, false);
    document.addEventListener('wheel', function(e) {
        if (e.ctrlKey) { e.preventDefault(); }
    }, { passive: false });
    </script>
</body>
</html>
