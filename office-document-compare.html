    <script src="https://cdn.jsdelivr.net/npm/diff@5.1.0/dist/diff.min.js"></script>
    <script>
        tailwind.config={
            theme:{
                extend:{
                    colors:{primary:'#3B82F6',secondary:'#10B981',accent:'#8B5CF6',dark:'#1F2937'},
                    fontFamily:{inter:['Inter','system-ui','sans-serif']}

    <style>
        /* 修复页脚浮空：让body和html占满全屏，内容区域自动撑开，页脚始终在最底部 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1 0 auto;
        }
        footer {
            flex-shrink: 0;
        }
        .diff-insert {
            background-color: #d4fcbc;
            color: #1e4620;
            display: inline;
            padding: 0 2px;
            border-radius: 3px;
        }
        .diff-delete {
            background-color: #fcc4c4;
            color: #8b0000;
            text-decoration: line-through;
            display: inline;
            padding: 0 2px;
            border-radius: 3px;
        }
        .diff-line {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        .compare-container {
            max-height: 600px;
            overflow-y: auto;
        }
        .line-number {
            user-select: none;
            -webkit-user-select: none;
            background-color: #f9fafb;
            text-align: right;
            padding-right: 12px;
            color: #9ca3af;
            font-size: 12px;
            border-right: 1px solid #e5e7eb;
            width: 50px;
        }
        .line-content {
            white-space: pre-wrap;
            word-break: break-word;
            padding-left: 12px;
            flex: 1;
        }
        .diff-line-item {
            display: flex;
            border-bottom: 1px solid #f0f0f0;
        }
        .diff-line-item:hover {
            background-color: #f9fafb;
        }
        .stat-badge {
            transition: all 0.2s;
        }
        .tab-active {
            border-bottom: 2px solid #3B82F6;
            color: #3B82F6;
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3B82F6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<script>
    // DOM 元素
    const fileLeftInput = document.getElementById('fileLeft');
    const fileRightInput = document.getElementById('fileRight');
    const selectLeftBtn = document.getElementById('selectLeftBtn');
    const selectRightBtn = document.getElementById('selectRightBtn');
    const uploadAreaLeft = document.getElementById('uploadAreaLeft');
    const uploadAreaRight = document.getElementById('uploadAreaRight');
    const fileNameLeftSpan = document.getElementById('fileNameLeft');
    const fileNameRightSpan = document.getElementById('fileNameRight');
    const compareBtn = document.getElementById('compareBtn');
    const swapBtn = document.getElementById('swapBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resultArea = document.getElementById('resultArea');
    const compareResultDiv = document.getElementById('compareResult');
    const loadingDiv = document.getElementById('loadingDiv');
    const unifiedViewBtn = document.getElementById('unifiedViewBtn');
    const splitViewBtn = document.getElementById('splitViewBtn');
    const statisticsSpan = document.getElementById('statistics');

    let leftFile = null;
    let rightFile = null;
    let leftContent = '';
    let rightContent = '';
    let currentView = 'unified'; // unified / split

    // 辅助函数：提取文件文本内容
    async function extractTextFromFile(file) {
        if (!file) return '';
        const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
        
        try {
            if (ext === '.txt') {
                return await file.text();
            } 
            else if (ext === '.docx') {
                const arrayBuffer = await file.arrayBuffer();
                const result = await mammoth.extractRawText({ arrayBuffer });
                return result.value || '';
            }
            else if (ext === '.doc') {
                return ''; // .doc 不支持，返回空
            }
            else {
                return '';
            }
        } catch (err) {
            console.error('提取文本失败', err);
            return '';
        }
    }

    // 更新左侧文件显示
    selectLeftBtn.addEventListener('click', () => fileLeftInput.click());
    uploadAreaLeft.addEventListener('click', (e) => {
        if (e.target !== selectLeftBtn) fileLeftInput.click();
    });
    fileLeftInput.addEventListener('change', async (e) => {
        if (e.target.files.length > 0) {
            leftFile = e.target.files[0];
            fileNameLeftSpan.textContent = `已选择：${leftFile.name}`;
            fileNameLeftSpan.classList.remove('hidden');
            // 自动提取内容
            leftContent = await extractTextFromFile(leftFile);
        } else {
            leftFile = null;
            fileNameLeftSpan.classList.add('hidden');
            leftContent = '';
        }
        updateCompareButton();
    });

    // 更新右侧文件显示
    selectRightBtn.addEventListener('click', () => fileRightInput.click());
    uploadAreaRight.addEventListener('click', (e) => {
        if (e.target !== selectRightBtn) fileRightInput.click();
    });
    fileRightInput.addEventListener('change', async (e) => {
        if (e.target.files.length > 0) {
            rightFile = e.target.files[0];
            fileNameRightSpan.textContent = `已选择：${rightFile.name}`;
            fileNameRightSpan.classList.remove('hidden');
            rightContent = await extractTextFromFile(rightFile);
        } else {
            rightFile = null;
            fileNameRightSpan.classList.add('hidden');
            rightContent = '';
        }
        updateCompareButton();
    });

    // 拖拽支持
    function setupDragAndDrop(area, input, isLeft) {
        area.addEventListener('dragover', (e) => {
            e.preventDefault();
            area.classList.add('border-primary', 'bg-blue-50');
        });
        area.addEventListener('dragleave', () => {
            area.classList.remove('border-primary', 'bg-blue-50');
        });
        area.addEventListener('drop', async (e) => {
            e.preventDefault();
            area.classList.remove('border-primary', 'bg-blue-50');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                if (isLeft) {
                    leftFile = file;
                    fileLeftInput.files = files;
                    fileNameLeftSpan.textContent = `已选择：${leftFile.name}`;
                    fileNameLeftSpan.classList.remove('hidden');
                    leftContent = await extractTextFromFile(leftFile);
                } else {
                    rightFile = file;
                    fileRightInput.files = files;
                    fileNameRightSpan.textContent = `已选择：${rightFile.name}`;
                    fileNameRightSpan.classList.remove('hidden');
                    rightContent = await extractTextFromFile(rightFile);
                }
                updateCompareButton();
            }
        });
    }
    setupDragAndDrop(uploadAreaLeft, fileLeftInput, true);
    setupDragAndDrop(uploadAreaRight, fileRightInput, false);

    function updateCompareButton() {
        compareBtn.disabled = !(leftFile && rightFile && (leftContent || rightContent));
    }

    // 交换文档
    swapBtn.addEventListener('click', async () => {
        if (!leftFile && !rightFile) return;
        // 交换文件对象和内容
        const tempFile = leftFile;
        leftFile = rightFile;
        rightFile = tempFile;
        
        const tempContent = leftContent;
        leftContent = rightContent;
        rightContent = tempContent;
        
        // 更新UI
        if (leftFile) {
            fileNameLeftSpan.textContent = `已选择：${leftFile.name}`;
            fileNameLeftSpan.classList.remove('hidden');
            // 更新input
            const leftDataTransfer = new DataTransfer();
            leftDataTransfer.items.add(leftFile);
            fileLeftInput.files = leftDataTransfer.files;
        } else {
            fileNameLeftSpan.classList.add('hidden');
            fileLeftInput.files = null;
        }
        
        if (rightFile) {
            fileNameRightSpan.textContent = `已选择：${rightFile.name}`;
            fileNameRightSpan.classList.remove('hidden');
            const rightDataTransfer = new DataTransfer();
            rightDataTransfer.items.add(rightFile);
            fileRightInput.files = rightDataTransfer.files;
        } else {
            fileNameRightSpan.classList.add('hidden');
            fileRightInput.files = null;
        }
        
        updateCompareButton();
        if (leftContent && rightContent) {
            performCompare();
        }
    });

    // 清空所有
    clearBtn.addEventListener('click', () => {
        leftFile = null;
        rightFile = null;
        leftContent = '';
        rightContent = '';
        fileLeftInput.value = '';
        fileRightInput.value = '';
        fileNameLeftSpan.classList.add('hidden');
        fileNameRightSpan.classList.add('hidden');
        resultArea.classList.add('hidden');
        compareBtn.disabled = true;
        compareResultDiv.innerHTML = '';
    });

    // 统一视图渲染 (基于 diff 逐行对比)
    function renderUnifiedDiff(leftText, rightText) {
        const diffLines = Diff.diffLines(leftText, rightText);
        let lineNumberLeft = 1;
        let lineNumberRight = 1;
        let html = '<div class="font-mono text-sm">';
        
        let addedCount = 0;
        let removedCount = 0;
        
        for (const part of diffLines) {
            const lines = part.value.split(/\r?\n/);
            // 保留最后一个空行导致的细节
            const isLastLineEmpty = part.value.endsWith('\n');
            for (let i = 0; i < lines.length; i++) {
                if (i === lines.length - 1 && lines[i] === '' && !isLastLineEmpty && lines.length > 1) continue;
                const line = lines[i];
                if (part.added) {
                    // 新增内容
                    html += `<div class="diff-line-item hover:bg-gray-50">
                                <div class="line-number" style="background:#f9fafb;"></div>
                                <div class="line-content diff-insert">+ ${escapeHtml(line)}</div>
                             </div>`;
                    addedCount++;
                    lineNumberRight++;
                } else if (part.removed) {
                    // 删除内容
                    html += `<div class="diff-line-item hover:bg-gray-50">
                                <div class="line-number" style="background:#f9fafb;"></div>
                                <div class="line-content diff-delete">- ${escapeHtml(line)}</div>
                             </div>`;
                    removedCount++;
                    lineNumberLeft++;
                } else {
                    // 相同内容
                    html += `<div class="diff-line-item hover:bg-gray-50">
                                <div class="line-number">${lineNumberLeft}</div>
                                <div class="line-content">${escapeHtml(line)}</div>
                             </div>`;
                    lineNumberLeft++;
                    lineNumberRight++;
                }
            }
        }
        html += '</div>';
        return { html, addedCount, removedCount };
    }
    
    // 并排视图渲染 (左右对比)
    function renderSplitDiff(leftText, rightText) {
        const leftLines = leftText.split(/\r?\n/);
        const rightLines = rightText.split(/\r?\n/);
        const maxLines = Math.max(leftLines.length, rightLines.length);
        let diffMap = new Map();
        // 使用行级差异简单标记
        const lineDiffs = [];
        for (let i = 0; i < maxLines; i++) {
            const leftLine = i < leftLines.length ? leftLines[i] : '';
            const rightLine = i < rightLines.length ? rightLines[i] : '';
            let leftClass = '';
            let rightClass = '';
            if (leftLine !== rightLine) {
                if (leftLine === '') leftClass = 'diff-insert';
                else if (rightLine === '') rightClass = 'diff-delete';
                else {
                    // 不同内容标记为浅色背景，但不标红绿，采用淡黄提示
                    leftClass = 'bg-yellow-50';
                    rightClass = 'bg-yellow-50';
                }
            }
            lineDiffs.push({ leftLine, rightLine, leftClass, rightClass });
        }
        
        let addedCount = 0, removedCount = 0;
        let html = `<div class="grid grid-cols-2 gap-0 border border-gray-200 rounded-lg overflow-hidden">
                        <div class="bg-gray-100 p-2 border-r border-gray-300 font-semibold text-sm text-center">原始文档</div>
                        <div class="bg-gray-100 p-2 font-semibold text-sm text-center">对比文档</div>`;
        
        for (let idx = 0; idx < lineDiffs.length; idx++) {
            const { leftLine, rightLine, leftClass, rightClass } = lineDiffs[idx];
            if (leftLine === '' && rightLine === '') continue;
            const leftDisplay = leftLine === '' ? ' ' : escapeHtml(leftLine);
            const rightDisplay = rightLine === '' ? ' ' : escapeHtml(rightLine);
            if (leftLine !== rightLine) {
                if (rightLine !== '' && leftLine === '') addedCount++;
                else if (leftLine !== '' && rightLine === '') removedCount++;
                else { addedCount++; removedCount++; }
            }
            html += `<div class="contents">
                        <div class="border-t border-gray-200 p-2 font-mono text-xs ${leftClass} whitespace-pre-wrap break-all">${leftDisplay}</div>
                        <div class="border-t border-gray-200 p-2 font-mono text-xs ${rightClass} whitespace-pre-wrap break-all">${rightDisplay}</div>
                    </div>`;
        }
        html += `</div>`;
        return { html, addedCount, removedCount };
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/ /g, ' ').replace(/\t/g, '    ');
    }
    
    async function performCompare() {
        if (!leftContent && !rightContent) {
            alert('请确保两个文档都已上传且内容有效');
            return;
        }
        loadingDiv.classList.remove('hidden');
        
        setTimeout(async () => {
            try {
                let stats = { added: 0, removed: 0 };
                let resultHtml = '';
                if (currentView === 'unified') {
                    const unified = renderUnifiedDiff(leftContent, rightContent);
                    resultHtml = unified.html;
                    stats.added = unified.addedCount;
                    stats.removed = unified.removedCount;
                } else {
                    const split = renderSplitDiff(leftContent, rightContent);
                    resultHtml = split.html;
                    stats.added = split.addedCount;
                    stats.removed = split.removedCount;
                }
                compareResultDiv.innerHTML = resultHtml || '<div class="text-center text-gray-400 py-8">两个文档内容完全一致，没有差异</div>';
                statisticsSpan.innerHTML = `<i class="fa fa-bar-chart mr-1"></i>新增: <span class="text-green-600 font-semibold">${stats.added}</span> 行 &nbsp;|&nbsp; 删除: <span class="text-red-600 font-semibold">${stats.removed}</span> 行`;
                resultArea.classList.remove('hidden');
            } catch (err) {
                console.error(err);
                alert('对比失败: ' + err.message);
            } finally {
                loadingDiv.classList.add('hidden');
            }
        }, 100);
    }
    
    compareBtn.addEventListener('click', async () => {
        if (!leftFile || !rightFile) {
            alert('请完整上传左侧和右侧文档');
            return;
        }
        // 确保内容已提取
        if (!leftContent || !rightContent) {
            leftContent = await extractTextFromFile(leftFile);
            rightContent = await extractTextFromFile(rightFile);
        }
        performCompare();
    });
    
    unifiedViewBtn.addEventListener('click', () => {
        currentView = 'unified';
        unifiedViewBtn.classList.add('tab-active', 'text-primary');
        unifiedViewBtn.classList.remove('text-gray-500');
        splitViewBtn.classList.remove('tab-active', 'text-primary');
        splitViewBtn.classList.add('text-gray-500');
        if (leftContent && rightContent) performCompare();
    });
    
    splitViewBtn.addEventListener('click', () => {
        currentView = 'split';
        splitViewBtn.classList.add('tab-active', 'text-primary');
        splitViewBtn.classList.remove('text-gray-500');
        unifiedViewBtn.classList.remove('tab-active', 'text-primary');
        unifiedViewBtn.classList.add('text-gray-500');
        if (leftContent && rightContent) performCompare();
    });
    
    // 移动菜单
    document.getElementById('menu-toggle').onclick = function() {
        document.getElementById('mobile-menu').classList.toggle('hidden');
    };
    
    updateCompareButton();
</script>
</body>
</html>
