<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .user-card {
            border: 2px solid #ddd;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .user-card h3 {
            margin-top: 0;
        }
        .btn {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover {
            background: #c0392b;
        }
        .btn-secondary {
            background: #3498db;
        }
        .btn-secondary:hover {
            background: #2980b9;
        }
        .success {
            color: green;
            padding: 10px;
            background: #d4edda;
            border-radius: 5px;
            margin: 10px 0;
        }
        .error {
            color: red;
            padding: 10px;
            background: #f8d7da;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🛡️ 用户管理系统</h1>
    <p>这是一个临时管理页面，用于管理用户账户。</p>
    
    <h2>当前用户列表：</h2>
    <div id="users-list">加载中...</div>
    
    <div id="message"></div>
    
    <h2>操作说明：</h2>
    <ul>
        <li>⚠️ 如果你无法注册新用户，可能是因为使用了 "admin" 这个用户名</li>
        <li>💡 请使用其他用户名注册，如 "testuser"、"newuser" 等</li>
        <li>🔐 管理员账号 admin 应该保留用于管理后台</li>
    </ul>
    
    <button onclick="location.href='login.html'" class="btn btn-secondary">
        前往登录页面
    </button>

    <script>
        const API_BASE = '/api';
        
        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/admin/stats`);
                const result = await response.json();
                
                if (result.success) {
                    displayMessage(`当前系统共有 ${result.data.totalUsers} 个用户`, 'success');
                }
            } catch (error) {
                displayMessage('加载用户统计失败', 'error');
            }
        }
        
        function displayMessage(msg, type) {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = msg;
            document.getElementById('message').appendChild(div);
            setTimeout(() => div.remove(), 5000);
        }
        
        loadUsers();
    </script>
</body>
</html>
