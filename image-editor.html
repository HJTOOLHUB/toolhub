<script>
    // 全局变量
    let originalImageData = null;      // 存储原始图片的 base64 / blobURL 原始未处理
    let currentWorkingImage = null;    // 当前显示的图片对象(src)
    let canvas = document.createElement('canvas');
    let ctx = canvas.getContext('2d');
    let imgElement = new Image();
    let currentFilters = {
        brightness: 0,
        contrast: 0,
        saturation: 0,
        blur: 0,
        filterType: 'none'
    };
    let historyStack = []; // 存储快照(base64)
    
    // DOM 元素
    const mainImage = document.getElementById('mainImage');
    const brightnessSlider = document.getElementById('brightness');
    const contrastSlider = document.getElementById('contrast');
    const saturationSlider = document.getElementById('saturation');
    const blurSlider = document.getElementById('blur');
    const brightnessVal = document.getElementById('brightnessVal');
    const contrastVal = document.getElementById('contrastVal');
    const saturationVal = document.getElementById('saturationVal');
    const blurVal = document.getElementById('blurVal');
    const applyBtn = document.getElementById('applyBtn');
    const resetAllBtn = document.getElementById('resetAllBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const uploadZone = document.getElementById('uploadZone');
    const imageUpload = document.getElementById('imageUpload');
    const rotateLeftBtn = document.getElementById('rotateLeftBtn');
    const rotateRightBtn = document.getElementById('rotateRightBtn');
    const flipHorizontalBtn = document.getElementById('flipHorizontalBtn');
    const flipVerticalBtn = document.getElementById('flipVerticalBtn');
    const historyListDiv = document.getElementById('historyList');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const imgInfoSpan = document.getElementById('imgInfo');
    
    // 辅助: 更新滑块数值显示
    function updateSlidersDisplay() {
        brightnessVal.innerText = currentFilters.brightness;
        contrastVal.innerText = currentFilters.contrast;
        saturationVal.innerText = currentFilters.saturation;
        blurVal.innerText = currentFilters.blur;
        brightnessSlider.value = currentFilters.brightness;
        contrastSlider.value = currentFilters.contrast;
        saturationSlider.value = currentFilters.saturation;
        blurSlider.value = currentFilters.blur;
    }
    
    // 重置所有调整参数
    function resetFilters() {
        currentFilters = { brightness: 0, contrast: 0, saturation: 0, blur: 0, filterType: 'none' };
        updateSlidersDisplay();
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active', 'bg-primary', 'text-white', 'border-primary'));
        const noneBtn = document.querySelector('.filter-btn[data-filter="none"]');
        if(noneBtn) noneBtn.classList.add('active', 'bg-primary', 'text-white', 'border-primary');
        currentFilters.filterType = 'none';
        if (originalImageData) {
            applyFiltersAndRender();
        }
    }
    
    // 保存快照到历史
    function pushHistory() {
        if (!originalImageData) return;
        const currentSrc = mainImage.src;
        if (currentSrc && !currentSrc.includes('svg')) {
            historyStack.unshift(currentSrc);
            if (historyStack.length > 8) historyStack.pop();
            renderHistory();
        }
    }
    
    function renderHistory() {
        if (historyStack.length === 0) {
            historyListDiv.innerHTML = '<div class="text-gray-400 text-center py-2">暂无快照</div>';
            return;
        }
        historyListDiv.innerHTML = historyStack.map((src, idx) => `<div class="history-item p-1 rounded cursor-pointer truncate" data-snapshot="${idx}"><i class="fa fa-camera"></i> 快照 ${idx+1}</div>`).join('');
        document.querySelectorAll('.history-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const idx = parseInt(el.getAttribute('data-snapshot'));
                if (!isNaN(idx) && historyStack[idx]) {
                    mainImage.src = historyStack[idx];
                    // 同时更新originalImageData? 不允许改变原始基数据，放便后续重置; 但是单独恢复快照会把当前工作图片改变
                    // 保持一致性：用户点击快照直接显示，但调整参数基于当前图？为了体验: 点击快照后重置调整数值但使用该图作为新工作图
                    originalImageData = historyStack[idx];
                    imgElement.src = originalImageData;
                    resetFilters();
                }
            });
        });
    }
    
    // 核心函数：将当前参数应用到图片
    function applyFiltersAndRender() {
        if (!originalImageData) return;
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.filter = buildFilterString();
            ctx.drawImage(img, 0, 0);
            // 额外处理饱和度高级滤镜通过CSS? canvas滤镜不支持饱和度，需手动实现，我们使用CSS滤镜或者更复杂算法，为了准确使用内置？
            // canvas上下文filter支持saturate, 但是blur, brightness, contrast支持; 重新组合
            // 重构filter字符串
            ctx.filter = buildAdvancedFilter();
            ctx.drawImage(img, 0, 0);
            const resultUrl = canvas.toDataURL('image/png');
            mainImage.src = resultUrl;
            // 更新尺寸信息
            imgInfoSpan.innerText = `${img.width} x ${img.height}`;
        };
        img.src = originalImageData;
    }
    
    function buildAdvancedFilter() {
        let filters = [];
        if (currentFilters.brightness !== 0) filters.push(`brightness(${100 + currentFilters.brightness}%)`);
        if (currentFilters.contrast !== 0) filters.push(`contrast(${100 + currentFilters.contrast}%)`);
        if (currentFilters.saturation !== 0) filters.push(`saturate(${100 + currentFilters.saturation}%)`);
        if (currentFilters.blur !== 0) filters.push(`blur(${currentFilters.blur}px)`);
        if (currentFilters.filterType !== 'none') {
            if (currentFilters.filterType === 'grayscale') filters.push('grayscale(100%)');
            else if (currentFilters.filterType === 'sepia') filters.push('sepia(100%)');
            else if (currentFilters.filterType === 'invert') filters.push('invert(100%)');
            else if (currentFilters.filterType === 'warm') filters.push('sepia(40%) saturate(150%) brightness(105%)');
            else if (currentFilters.filterType === 'cool') filters.push('hue-rotate(30deg) saturate(120%)');
            else if (currentFilters.filterType === 'vintage') filters.push('sepia(50%) contrast(120%) brightness(95%)');
            else if (currentFilters.filterType === 'sharp') filters.push('contrast(130%) brightness(102%)');
            else if (currentFilters.filterType === 'soft') filters.push('blur(0.5px) brightness(103%)');
        }
        return filters.join(' ');
    }
    
    function buildFilterString() { return buildAdvancedFilter(); }
    
    // 上传图片处理
    function loadImageFromFile(file) {
        if (!file || !file.type.startsWith('image')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            originalImageData = e.target.result;
            imgElement.src = originalImageData;
            resetFilters();
            pushHistory();
        };
        reader.readAsDataURL(file);
    }
    
    uploadZone.addEventListener('click', () => imageUpload.click());
    imageUpload.addEventListener('change', (e) => { if(e.target.files.length) loadImageFromFile(e.target.files[0]); });
    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', (e) => {
        e.preventDefault(); uploadZone.classList.remove('drag-over');
        if(e.dataTransfer.files.length) loadImageFromFile(e.dataTransfer.files[0]);
    });
    
    // 实时监听滑块调整并非实时应用到图像(节省性能)，点击应用才触发
    brightnessSlider.addEventListener('input', (e) => { currentFilters.brightness = parseInt(e.target.value); updateSlidersDisplay(); });
    contrastSlider.addEventListener('input', (e) => { currentFilters.contrast = parseInt(e.target.value); updateSlidersDisplay(); });
    saturationSlider.addEventListener('input', (e) => { currentFilters.saturation = parseInt(e.target.value); updateSlidersDisplay(); });
    blurSlider.addEventListener('input', (e) => { currentFilters.blur = parseFloat(e.target.value); updateSlidersDisplay(); });
    
    document.querySelectorAll('.reset-val').forEach(el => {
        el.addEventListener('click', (e) => {
            const target = el.getAttribute('data-reset');
            if (target === 'brightness') currentFilters.brightness = 0;
            if (target === 'contrast') currentFilters.contrast = 0;
            if (target === 'saturation') currentFilters.saturation = 0;
            if (target === 'blur') currentFilters.blur = 0;
            updateSlidersDisplay();
            applyFiltersAndRender();
        });
    });
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'bg-primary', 'text-white'));
            btn.classList.add('active', 'bg-primary', 'text-white');
            currentFilters.filterType = btn.getAttribute('data-filter');
            applyFiltersAndRender();
        });
    });
    
    applyBtn.addEventListener('click', () => {
        if (!originalImageData) return;
        applyFiltersAndRender();
        pushHistory();
    });
    
    resetAllBtn.addEventListener('click', () => { resetFilters(); applyFiltersAndRender(); });
    
    downloadBtn.addEventListener('click', () => {
        if (!originalImageData) return;
        const link = document.createElement('a');
        link.download = 'beautified_image.png';
        link.href = mainImage.src;
        link.click();
    });
    
    // 旋转翻转功能
    function rotateImage(degrees) {
        if (!originalImageData) return;
        const img = new Image();
        img.onload = () => {
            canvas.width = img.height;
            canvas.height = img.width;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.rotate(degrees * Math.PI/180);
            ctx.drawImage(img, -img.width/2, -img.height/2);
            ctx.restore();
            const rotatedUrl = canvas.toDataURL('image/png');
            originalImageData = rotatedUrl;
            resetFilters();
            applyFiltersAndRender();
            pushHistory();
        };
        img.src = originalImageData;
    }
    
    function flipImage(direction) {
        if (!originalImageData) return;
        const img = new Image();
        img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.save();
            if(direction === 'horizontal') ctx.scale(-1, 1);
            if(direction === 'vertical') ctx.scale(1, -1);
            ctx.drawImage(img, direction === 'horizontal' ? -img.width : 0, direction === 'vertical' ? -img.height : 0);
            ctx.restore();
            const flippedUrl = canvas.toDataURL('image/png');
            originalImageData = flippedUrl;
            resetFilters();
            applyFiltersAndRender();
            pushHistory();
        };
        img.src = originalImageData;
    }
    
    rotateLeftBtn.addEventListener('click', () => rotateImage(-90));
    rotateRightBtn.addEventListener('click', () => rotateImage(90));
    flipHorizontalBtn.addEventListener('click', () => flipImage('horizontal'));
    flipVerticalBtn.addEventListener('click', () => flipImage('vertical'));
    
    clearHistoryBtn.addEventListener('click', () => { historyStack = []; renderHistory(); });
    
    // 初始化
    updateSlidersDisplay();
    document.querySelector('.filter-btn[data-filter="none"]').classList.add('active', 'bg-primary', 'text-white');
    
    // 移动菜单
    document.getElementById('menu-toggle').onclick = function() {
        document.getElementById('mobile-menu').classList.toggle('hidden');
    };
</script>
</body>
</html>
