<!DOCTYPE html>
<link rel="icon" href="https://img.cdn1.vip/i/69e8f3aeaa48a_1776874414.png" type="image/x-icon">
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合金工具库|404 Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        body {
            min-height: 100vh;
            background-color: #c0bebe; /* 白色背景 */
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 2rem;
        }
        /* 图片Logo样式 */
        .logo-img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 900;
            color: #000000;
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.2);
        }
        .title {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #222;
        }
        .warning-box {
            background-color: rgba(255, 71, 87, 0.08);
            border: 1px solid #f20014;
            border-radius: 12px;
            padding: 1.5rem;
            max-width: 600px;
            margin-bottom: 2rem;
            text-align: left;
        }
        .warning-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #e6182a;
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            /* 代码编辑器字体 */
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }
        .warning-list {
            list-style: none;
            line-height: 1.8;
            color: #000000;
            /* 代码编辑器字体（全局生效） */
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }
        .warning-list li {
            margin-bottom: 0.8rem;
            padding-left: 1.2rem;
            position: relative;
            /* 代码字体 */
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }
        .warning-list li::before {
            content: "•";
            color: #ff0015;
            position: absolute;
            left: 0;
        }
        .highlight {
            color: #ff0015;
            font-weight: 600;
            /* 高亮文字也统一代码字体 */
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }
        /* 返回首页按钮样式 - 深红色 */
        .home-btn {
            display: inline-block;
            padding: 12px 28px;
            background-color: #b71c1c; /* 深红色 */
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            margin-bottom: 1.2rem; /* 与标题间距 */
        }
        .home-btn:hover {
            background-color: #8b0000;
            transform: translateY(-2px);
        }
        .footer {
            color: #000000;
            font-size: 0.9rem;
            margin-top: 2rem;
        }
        @media (max-width: 600px) {
            .error-code {
                font-size: 4rem;
            }
            .title {
                font-size: 1.4rem;
            }
            .warning-box {
                padding: 1rem;
            }
            .logo-img {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="https://img.cdn1.vip/i/69e8f3aeaa48a_1776874414.png" class="logo-img" alt="Logo">
    </div>

    <div class="error-code">404</div>
    <div class="error-code">NOT FOUND</div>

    <!-- 返回首页按钮 已移到标题上方 -->
    <a href="index.html" class="home-btn">⇦返回首页</a>

    <h1 class="title">⨂ 报错原因 ⨂</h1>

    <div class="warning-box">
        <div class="warning-title">
            <span>⨷</span> 报错原因如下
        </div>
        <ul class="warning-list">
            <li><span class="highlight">维护时间：</span>2026年4月22日22:00 - 2026年4月26日02:00（不停机维护）</li>
            <li><span class="highlight">受影响组件：</span>除「杂杂时钟」与「网站主页面、网站协议」外的所有工具将停用</li>
            <li><span class="highlight">维护原因：</span>其他工具因对应开发者未进行维护所导致严重BUG将停用</li>
            <li><span class="highlight">用户影响：</span>在维护期间，受影响工具将无法使用，请提前做好数据备份</li>
            <li><span class="highlight">维护预告：</span>团队正在加急开发新版工具，预计将在2026年5月上线，敬请期待！</li>
        </ul>
    </div>

    <div class="footer">
        三龙S.L Studio Copyright © 2024-2026
    </div>
</body>
</html>
